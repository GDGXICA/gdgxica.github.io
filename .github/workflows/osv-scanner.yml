name: OSV Scanner

on:
  schedule:
    - cron: "0 8 * * 1" # weekly, Monday — same cadence as Dependabot
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-scheduled:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        -r
        --skip-git
        ./
      fail-on-vuln: false
