name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [data-updated]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.15.0"

      - name: Setup Java (for Firestore emulator)
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.11.0

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci

      - name: Run unit tests (root)
        run: pnpm test

      - name: Run Cloud Functions tests
        run: pnpm test:functions

      - name: Run security rules tests
        run: pnpm test:rules

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.15.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch gdg-ica-data
        run: |
          git clone --depth 1 https://github.com/GDGXICA/gdg-ica-data.git /tmp/gdg-data
          cp -r /tmp/gdg-data/images/* public/

      - name: Build project
        env:
          GDG_DATA_LOCAL_PATH: /tmp/gdg-data
        run: pnpm run build

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci

      - name: Build Cloud Functions
        run: cd functions && npm run build

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools@15.14.0

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only "hosting:gdgica,functions,firestore:rules,firestore:indexes" --force

      - name: Cleanup old hosting versions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase hosting:releases:list --site gdgica --limit 50 | tail -n +3 | tail -n +6 | awk '{print $2}' | while read version; do
            [ -n "$version" ] && firebase hosting:releases:cleanup "$version" --site gdgica --force 2>/dev/null || true
          done
