name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [data-updated]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22.15.0"

      - name: Setup Java (for Firestore emulator)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10.11.0

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci

      - name: Run unit tests (root)
        run: pnpm test

      - name: Run Cloud Functions tests
        run: pnpm test:functions

      - name: Run security rules tests
        run: pnpm test:rules

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22.15.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch gdg-ica-data
        run: |
          git clone --depth 1 https://github.com/GDGXICA/gdg-ica-data.git /tmp/gdg-data
          cp -r /tmp/gdg-data/images/* public/

      - name: Build project
        env:
          GDG_DATA_LOCAL_PATH: /tmp/gdg-data
        run: pnpm run build

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci

      - name: Build Cloud Functions
        run: cd functions && npm run build

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools@15.14.0

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only "hosting:gdgica,functions,firestore:rules,firestore:indexes" --force

      - name: Cleanup old hosting versions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase hosting:releases:list --site gdgica --limit 50 | tail -n +3 | tail -n +6 | awk '{print $2}' | while read version; do
            [ -n "$version" ] && firebase hosting:releases:cleanup "$version" --site gdgica --force 2>/dev/null || true
          done
